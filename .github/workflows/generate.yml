name: Generate Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run generators
        run: |
          python generate_experience.py
          python generate_projects.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tabs/experience.html tabs/projects.html
          if git diff --cached --quiet; then
            echo "No changes to generated files."
          else
            git commit -m "Auto-generate pages [skip ci]"
            git push
          fi
